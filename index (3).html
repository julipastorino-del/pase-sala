<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pase de sala — Tx hepático pediátrico</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f1efe8;color:#1a1a1a;}
.app{max-width:900px;margin:0 auto;background:#fff;min-height:100vh;}
.hdr{padding:.8rem 1rem;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;justify-content:space-between;background:#fff;position:sticky;top:0;z-index:10;}
.hdr h1{font-size:13px;font-weight:700;}
.hdr p{font-size:10px;color:#666;margin-top:1px;}
.sdot{width:8px;height:8px;border-radius:50%;background:#27a;display:inline-block;margin-right:4px;}
.slbl{font-size:11px;color:#666;}
.tabs{display:flex;border-bottom:1px solid #e0e0e0;background:#fff;}
.tab{flex:1;padding:.7rem;font-size:12px;text-align:center;cursor:pointer;color:#888;border:none;background:transparent;font-family:inherit;font-weight:500;}
.tab.on{color:#185FA5;border-bottom:2px solid #185FA5;}
.content{padding:.9rem 1rem;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.stat{background:#f8f7f5;border-radius:8px;padding:.7rem;border:1px solid #e8e8e8;text-align:center;}
.stat-n{font-size:22px;font-weight:700;}
.stat-l{font-size:10px;color:#888;margin-top:2px;}
.loc-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
.loc{flex:1;min-width:100px;border-radius:8px;padding:.6rem .8rem;border:1px solid #e0e0e0;}
.loc-uci{background:#FCEBEB;border-color:#F7C1C1;}
.loc-cim{background:#EAF3DE;border-color:#C0DD97;}
.loc-otro{background:#f8f7f5;}
.loc-n{font-size:18px;font-weight:700;}
.loc-uci .loc-n{color:#791F1F;}
.loc-cim .loc-n{color:#27500A;}
.loc-l{font-size:11px;font-weight:700;margin-top:1px;}
.loc-uci .loc-l{color:#791F1F;}
.loc-cim .loc-l{color:#27500A;}
.loc-l2{font-size:10px;color:#888;margin-top:2px;}

/* CARDS */
.card{border-radius:10px;border:1px solid #e0e0e0;background:#fff;margin-bottom:8px;cursor:pointer;overflow:hidden;}
.card:hover{border-color:#aaa;}
.card-top{display:flex;gap:8px;padding:10px 11px 8px;}
.strip{width:4px;border-radius:2px;min-height:50px;flex-shrink:0;}
.s-pre{background:#185FA5;}.s-post{background:#27500A;}.s-retx{background:#3C3489;}
.cname{font-weight:700;font-size:14px;}
.csub{font-size:11px;color:#666;margin-top:2px;line-height:1.4;}
.cbrow{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.cb{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.cb-pre{background:#E6F1FB;color:#185FA5;}
.cb-post{background:#EAF3DE;color:#27500A;}
.cb-retx{background:#EEEDFE;color:#3C3489;}
.cb-gray{background:#f0f0f0;color:#666;}
.cb-ok{background:#EAF3DE;color:#27500A;}
.cb-mal{background:#FCEBEB;color:#791F1F;}
.card-labs{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:6px 11px;background:#f8f7f5;border-top:1px solid #e8e8e8;}
.lbl{font-size:10px;color:#888;}.lbv{font-size:12px;font-weight:700;}
.card-dias{padding:5px 11px;border-top:1px solid #e8e8e8;background:#f8f7f5;font-size:10px;color:#666;display:flex;gap:10px;flex-wrap:wrap;}
.card-dias strong{color:#185FA5;}
.card-pend{padding:5px 11px;border-top:1px solid #FAC775;background:#FAEEDA;font-size:10px;color:#854F0B;font-weight:600;}
.card-alert{padding:5px 11px;border-top:1px solid #F7C1C1;background:#FCEBEB;font-size:10px;color:#791F1F;font-weight:600;}
.add-btn{width:100%;padding:.8rem;border:1px dashed #ccc;border-radius:10px;background:transparent;color:#888;font-size:13px;font-family:inherit;cursor:pointer;margin-top:4px;}

/* FORM */
.sec-box{background:#f8f7f5;border-radius:10px;padding:.8rem;border:1px solid #e8e8e8;margin-bottom:.8rem;}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#888;margin-bottom:8px;}
.sec-lbl.green{color:#27500A;background:#EAF3DE;padding:3px 9px;border-radius:20px;display:inline-block;}
.sec-lbl.blue{color:#185FA5;background:#E6F1FB;padding:3px 9px;border-radius:20px;display:inline-block;}
.sec-lbl.purple{color:#3C3489;background:#EEEDFE;padding:3px 9px;border-radius:20px;display:inline-block;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.g4{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
@media(min-width:600px){.g4{grid-template-columns:1fr 1fr 1fr 1fr;}}
.gc2{grid-column:span 2;}.gca{grid-column:1/-1;}
.fld{display:flex;flex-direction:column;gap:3px;}
.fld label{font-size:11px;color:#666;font-weight:500;}
.fld input,.fld select,.fld textarea{font-size:14px;padding:8px 10px;border:1px solid #ddd;border-radius:7px;background:#fff;color:#1a1a1a;font-family:inherit;width:100%;}
.fld textarea{resize:vertical;min-height:60px;line-height:1.5;}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:#185FA5;}
.ar{display:flex;gap:4px;}.ar input{flex:2;}.ar select{flex:1;min-width:0;}
.ctx-box{border-radius:7px;padding:7px 10px;font-size:12px;margin-bottom:8px;line-height:1.5;}
.ctx-pre{background:#E6F1FB;color:#185FA5;}
.ctx-post{background:#EAF3DE;color:#27500A;}
.ctx-retx{background:#EEEDFE;color:#3C3489;}
.eval-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
@media(min-width:500px){.eval-grid{grid-template-columns:repeat(3,1fr);}}
.eval-item label{font-size:11px;color:#666;}
.eval-item select{font-size:13px;padding:6px 8px;border:1px solid #ddd;border-radius:7px;background:#fff;width:100%;}
.eval-item select.pend{border-color:#FAC775;background:#FAEEDA;color:#854F0B;}
.eval-item select.apto{border-color:#C0DD97;background:#EAF3DE;color:#27500A;}
.tw{display:flex;flex-wrap:wrap;gap:4px;padding:6px 8px;border:1px solid #ddd;border-radius:7px;background:#fff;min-height:40px;align-items:center;}
.tw input{border:none;outline:none;font-size:13px;background:transparent;min-width:80px;flex:1;padding:0;}
.tg{display:inline-flex;align-items:center;gap:3px;border-radius:20px;padding:3px 8px;font-size:11px;}
.t-a{background:#E6F1FB;color:#0C447C;}.t-i{background:#FAEEDA;color:#633806;}.t-t{background:#EAF3DE;color:#27500A;}.t-c{background:#EEEDFE;color:#3C3489;}
.tx{cursor:pointer;opacity:.5;font-size:13px;padding:0 2px;}.tx:hover{opacity:1;}
.lab-hist{background:#f0f0f0;border-radius:7px;padding:7px 10px;font-size:11px;margin-top:6px;}
.lhr{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #e0e0e0;font-size:11px;}
.lhr:last-child{border-bottom:none;}
.peld-row{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;}
.peld-card{text-align:center;background:#E6F1FB;border-radius:8px;padding:8px 14px;border:1px solid #B5D4F4;}
.peld-n{font-size:22px;font-weight:700;color:#185FA5;}
.peld-l{font-size:10px;color:#666;margin-top:1px;}
.fk-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:6px;}
.fk-table th{background:#f0f0f0;padding:5px 7px;border:1px solid #e0e0e0;font-size:10px;color:#666;}
.fk-table td{padding:5px 7px;border:1px solid #e0e0e0;text-align:center;}
.sbox{background:#f8f7f5;border-radius:7px;padding:8px 11px;font-size:12px;color:#666;border:1px solid #e0e0e0;margin-top:8px;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.b-ok{background:#EAF3DE;color:#27500A;}.b-med{background:#FAEEDA;color:#854F0B;}.b-mal{background:#FCEBEB;color:#791F1F;}

/* BUTTONS */
.btn-pri{background:#185FA5;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;}
.btn-pri:active{opacity:.85;}
.btn-sec{background:#fff;color:#1a1a1a;border:1px solid #ccc;border-radius:8px;padding:10px 15px;font-size:14px;font-family:inherit;cursor:pointer;}
.btn-sec:hover{background:#f5f5f5;}
.btn-alta{background:#27500A;color:#fff;border:none;border-radius:8px;padding:10px 15px;font-size:14px;font-family:inherit;cursor:pointer;margin-left:auto;}
.btn-del{background:#fff;color:#791F1F;border:1px solid #F7C1C1;border-radius:8px;padding:10px 15px;font-size:14px;font-family:inherit;cursor:pointer;}
.form-actions{display:flex;gap:8px;padding-bottom:1.5rem;flex-wrap:wrap;margin-top:.5rem;}

/* DETAIL */
.det-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.8rem;gap:8px;}
.det-name{font-size:17px;font-weight:700;}
.det-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
.det-back{background:#fff;border:1px solid #ccc;border-radius:8px;padding:7px 12px;font-size:13px;font-family:inherit;cursor:pointer;white-space:nowrap;}
.det-sec{margin-bottom:.8rem;}
.det-slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#888;margin-bottom:7px;}
.det-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:13px;}
.det-row:last-child{border-bottom:none;}
.det-l{color:#888;min-width:130px;flex-shrink:0;font-size:12px;}
.det-v{flex:1;line-height:1.5;}
.det-v.pend{color:#854F0B;font-weight:600;}
.labgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:5px;}
.labcard{background:#f8f7f5;border-radius:7px;padding:7px 9px;border:1px solid #e8e8e8;}
.labcard-l{font-size:10px;color:#888;}
.labcard-v{font-size:14px;font-weight:700;margin-top:2px;}
.labcard-u{font-size:10px;font-weight:400;color:#888;}
.pillrow{display:flex;flex-wrap:wrap;gap:4px;}
.pend-banner{background:#FAEEDA;border:1px solid #FAC775;border-radius:8px;padding:8px 12px;margin-bottom:.8rem;font-size:12px;color:#854F0B;font-weight:600;}
.offline-bar{background:#FAEEDA;border-bottom:1px solid #FAC775;padding:5px 1rem;font-size:11px;color:#633806;display:none;}
.offline-bar.show{display:block;}
</style>
</head>
<body>
<div class="app">
<div class="offline-bar" id="ob"></div>
<div class="hdr">
  <div><h1>Pase de sala — Tx hepático pediátrico</h1><p id="fhdr"></p></div>
  <div><span class="sdot" id="sdot" style="background:#aaa;"></span><span id="slbl" class="slbl">...</span></div>
</div>
<div class="tabs">
  <button class="tab on" id="t-sala" onclick="showSala()">🏥 Sala</button>
  <button class="tab" id="t-nuevo" onclick="showForm(null)">＋ Nuevo</button>
  <button class="tab" id="t-sync" onclick="forceSync()">↻ Sync</button>
</div>
<div id="pnl-sala" class="content">
  <div class="stats">
    <div class="stat"><div class="stat-n" id="st0">0</div><div class="stat-l">Total</div></div>
    <div class="stat" style="border-color:#B5D4F4;"><div class="stat-n" style="color:#185FA5;" id="st1">0</div><div class="stat-l">Pre-Tx</div></div>
    <div class="stat" style="border-color:#CECBF6;"><div class="stat-n" style="color:#3C3489;" id="st3">0</div><div class="stat-l">Re-Tx</div></div>
  </div>
  <div class="loc-row" id="loc-row"></div>
  <div id="cards"></div>
  <button class="add-btn" onclick="showForm(null)">+ Agregar paciente</button>
</div>
<div id="pnl-det" class="content" style="display:none;"><div id="det-inner"></div></div>
<div id="pnl-form" class="content" style="display:none;"><div id="form-inner"></div></div>
</div>

<script>
var SU='https://script.google.com/macros/s/AKfycbywMhRbg3_ddatC14sjjZmPR1-GXnrSjoZNH_YA3g7xY4T_W7FzxfIbxXkitYSrNkXlIQ/exec';
var SK='pase_v8';
var PXS=[], EID=null, FT={a:[],i:[],t:[]}, FC=[], FKH=[], COMP=[];
var online=navigator.onLine, pending=[];

document.getElementById('fhdr').textContent=new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
window.addEventListener('online',function(){online=true;obUpdate();flush(function(){pull();});});
window.addEventListener('offline',function(){online=false;obUpdate();dot('of');});

function dias(fecha){
  if(!fecha)return null;
  var d=new Date(fecha),h=new Date();
  h.setHours(0,0,0,0);d.setHours(0,0,0,0);
  return Math.floor((h-d)/86400000);
}
function hoy(){return new Date().toISOString().split('T')[0];}
function fmtF(f){if(!f)return'—';var p=f.split('-');return p[2]+'/'+p[1]+'/'+p[0];}

// NAV
function showSala(){
  document.getElementById('pnl-sala').style.display='';
  document.getElementById('pnl-det').style.display='none';
  document.getElementById('pnl-form').style.display='none';
  setTab('t-sala');
  window.scrollTo(0,0);
}
function showDet(id){
  var p=PXS.find(function(x){return x.id===id;});
  if(!p)return;
  document.getElementById('pnl-sala').style.display='none';
  document.getElementById('pnl-det').style.display='';
  document.getElementById('pnl-form').style.display='none';
  setTab('');
  renderDet(p);
  window.scrollTo(0,0);
}
function showForm(p){
  EID=p?p.id:null;
  FT={a:(p?p.abx||[]:[]).slice(),i:(p?p.is_extra||[]:[]).slice(),t:(p?p.atb||[]:[]).slice()};
  FC=(p?p.cults||[]:[]).slice();
  FKH=(p?p.fk_history||[]:[]).slice();
  COMP=(p?p.complicaciones_post||[]:[]).slice();
  document.getElementById('pnl-sala').style.display='none';
  document.getElementById('pnl-det').style.display='none';
  document.getElementById('pnl-form').style.display='';
  setTab('t-nuevo');
  buildForm(p);
  window.scrollTo(0,0);
}
function setTab(on){
  ['t-sala','t-nuevo','t-sync'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.className='tab'+(id===on?' on':'');
  });
}

// SALA
function getTipo(p){
  if(p.momento==='retx')return'retx';
  if(p.momento==='pre')return'pre';
  return'post';
}
function getTipoLabel(p){
  var t=getTipo(p);
  if(t==='pre')return'Pre-trasplante';
  if(t==='retx')return'Re-trasplante';
  var m={post_inmediato:'Post-Tx inmediato',post_temprano:'Post-Tx temprano',post_tardio:'Post-Tx tardío (>6m)'};
  return m[p.momento]||'Post-Tx';
}
function getPends(p){
  var out=[];
  if(p.momento==='pre'||p.momento==='retx'){
    var evals=['cardio','neumo','nefro','infecto','neuro','orl','oftalmo','salud_mental','s_social','alimentacion','gineco'];
    evals.forEach(function(e){if(p['eval_'+e]==='pendiente')out.push(e.replace('_',' '));});
  }
  if(p.pendientes){p.pendientes.split('\n').forEach(function(l){if(l.trim())out.push(l.trim());});}
  return out;
}

function renderSala(pxs){
  document.getElementById('st0').textContent=pxs.length;
  document.getElementById('st1').textContent=pxs.filter(function(p){return p.momento==='pre';}).length;
  document.getElementById('st3').textContent=pxs.filter(function(p){return p.momento==='retx';}).length;

  var uci=pxs.filter(function(p){return p.sala&&p.sala.toLowerCase().indexOf('uci')>=0;});
  var cim=pxs.filter(function(p){return p.sala&&p.sala.toLowerCase().indexOf('cim')>=0;});
  var otros=pxs.filter(function(p){return p.sala&&p.sala.toLowerCase().indexOf('uci')<0&&p.sala.toLowerCase().indexOf('cim')<0;});
  var locHtml='';
  if(uci.length)locHtml+='<div class="loc loc-uci"><div class="loc-n">'+uci.length+'</div><div class="loc-l">UCI</div><div class="loc-l2">'+uci.map(function(p){return p.nombre.split(',')[0];}).join(', ')+'</div></div>';
  if(cim.length)locHtml+='<div class="loc loc-cim"><div class="loc-n">'+cim.length+'</div><div class="loc-l">CIM</div><div class="loc-l2">'+cim.map(function(p){return p.nombre.split(',')[0];}).join(', ')+'</div></div>';
  otros.forEach(function(p){locHtml+='<div class="loc loc-otro"><div class="loc-n">1</div><div class="loc-l">'+p.sala+'</div><div class="loc-l2">'+p.nombre.split(',')[0]+'</div></div>';});
  document.getElementById('loc-row').innerHTML=locHtml;

  if(!pxs.length){document.getElementById('cards').innerHTML='<div style="text-align:center;padding:2rem;color:#888;">No hay pacientes. Tocá + Nuevo para agregar.</div>';return;}

  var tipoCls={pre:'s-pre',post:'s-post',retx:'s-retx'};
  var cbCls={pre:'cb-pre',post:'cb-post',retx:'cb-retx'};
  var html='';
  pxs.forEach(function(p){
    var t=getTipo(p);
    var di=dias(p.fecha_ingreso);
    var dp=t!=='pre'?dias(p.fecha_tx):null;
    var da=p.fecha_inicio_atb?dias(p.fecha_inicio_atb):null;
    var pends=getPends(p);
    var alerts=[];
    if(p.vascular&&p.vascular!=='No')alerts.push('Comp. vascular');
    if(p.rechazo&&p.rechazo!=='No')alerts.push('Rechazo: '+p.rechazo);
    if(p.ptld&&p.ptld!=='No')alerts.push('PTLD');
    html+='<div class="card" onclick="showDet('+p.id+')">';
    html+='<div class="card-top"><div class="strip '+tipoCls[t]+'"></div><div style="flex:1;min-width:0;">';
    html+='<div class="cname">'+p.nombre+'</div>';
    html+='<div class="csub">'+(p.edad||'')+(p.peso?' · '+p.peso+' kg':'')+' · '+(p.diag||'—')+'</div>';
    if(p.sala)html+='<div class="csub" style="font-weight:600;">'+(p.sala)+(p.lugar_int?' — Cama '+p.lugar_int:'')+'</div>';
    html+='<div class="cbrow"><span class="cb '+cbCls[t]+'">'+getTipoLabel(p)+'</span>';
    if(p.estado)html+='<span class="cb cb-gray">'+p.estado+'</span>';
    if(p.lista_estado)html+='<span class="cb '+(p.lista_estado==='Activo'?'cb-ok':'cb-gray')+'">'+p.lista_estado+'</span>';
    html+='</div></div></div>';
    html+='<div class="card-labs">';
    [['Bili',p.bili],['INR',p.inr],['TGO',p.tgo],['Cr',p.creat]].forEach(function(x){
      html+='<div><div class="lbl">'+x[0]+'</div><div class="lbv">'+(x[1]||'—')+'</div></div>';
    });
    html+='</div>';
    if(di!==null||dp!==null||da!==null||p.peld){
      html+='<div class="card-dias">';
      if(di!==null)html+='Internado <strong>'+di+'d</strong> ';
      if(dp!==null)html+='Post-Tx <strong>'+dp+'d</strong> ';
      if(da!==null)html+='ATB <strong>'+da+'d</strong> ';
      if(p.peld)html+='PELD <strong>'+p.peld+'</strong>';
      html+='</div>';
    }
    if(pends.length)html+='<div class="card-pend">⚠ Pendiente: '+pends.slice(0,3).join(' · ')+(pends.length>3?' +más':'')+'</div>';
    if(alerts.length)html+='<div class="card-alert">⚑ '+alerts.join(' · ')+'</div>';
    html+='</div>';
  });
  document.getElementById('cards').innerHTML=html;
}

// DETAIL
function renderDet(p){
  var t=getTipo(p);
  var cbCls={pre:'cb-pre',post:'cb-post',retx:'cb-retx'}[t];
  var pends=getPends(p);
  var di=dias(p.fecha_ingreso);
  var dp=t!=='pre'?dias(p.fecha_tx):null;
  var da=p.fecha_inicio_atb?dias(p.fecha_inicio_atb):null;
  var labHist=p.lab_history||[];
  var labAct=labHist.length?labHist[labHist.length-1]:null;
  var fkHist=p.fk_history||[];
  var sc=score(p);
  var pp=function(arr,cls){return arr&&arr.length?'<div class="pillrow">'+arr.map(function(v){return'<span class="tg '+cls+'">'+v+'</span>';}).join('')+'</div>':'<span style="color:#888">—</span>';};
  var rw=function(l,v,isPend){return(v&&v!=='No'&&v!=='—'&&v!=='')?'<div class="det-row"><span class="det-l">'+l+'</span><span class="det-v'+(isPend?' pend':'')+'">'+v+'</span></div>':'';};

  var h='';
  h+='<div class="det-hdr"><div><div class="det-name">'+p.nombre+'</div><div class="det-badges">';
  h+='<span class="cb '+cbCls+'">'+getTipoLabel(p)+'</span>';
  if(p.estado)h+='<span class="cb cb-gray">'+p.estado+'</span>';

function ftag(e,t){
  if(e.key!=='Enter')return;e.preventDefault();
  var i=document.getElementById('fi'+t);var v=i.value.trim();if(!v)return;
  FT[t].push(v);i.value='';frtags(t);
}
function frtags(t){
  var w=document.getElementById('fw'+t),i=document.getElementById('fi'+t);
  if(!w||!i)return;
  while(w.querySelector('.tg'))w.querySelector('.tg').remove();
  var cls=t==='a'?'t-a':t==='t'?'t-t':'t-i';
  FT[t].forEach(function(v,j){
    var d=document.createElement('div');d.className='tg '+cls;
    d.innerHTML=v+'<span class="tx" onclick="frmtag(\''+t+'\','+j+')">×</span>';
    w.insertBefore(d,i);
  });
}
function frmtag(t,j){FT[t].splice(j,1);frtags(t);}

// SCORE
function score(p){
  var b=parseFloat(p.bili)||0,ir=parseFloat(p.inr)||0,tp=parseFloat(p.tp)||0;
  var al=parseFloat(p.alb)||0,cr=parseFloat(p.creat)||0,tg=parseFloat(p.tgo)||0;
  var dp=dias(p.fecha_tx)||0;
  var s=0;
  if(b>3)s++;if(b>5)s+=2;if(b>10)s+=2;if(b>20)s+=3;
  if(ir>1.5)s++;if(ir>2)s+=2;if(ir>3)s+=2;
  if(tp>0&&tp<50)s+=2;if(al>0&&al<3)s++;if(cr>1)s++;if(cr>2)s+=2;
  if(tg>500)s++;if(tg>1000)s+=2;
  var r=p.rechazo||'';
  if(r==='Agudo leve')s+=2;if(r==='Agudo moderado')s+=4;if(r==='Agudo grave'||r==='Humoral (AMR)')s+=7;if(r==='Crónico / ductopénico')s+=5;
  if(p.vascular&&p.vascular!=='No')s+=6;if(p.biliar&&p.biliar!=='No')s+=3;
  var inf=p.infec||'';if(inf==='Bacteriana')s+=2;
  if(['CMV','EBV','Adenovirus','Viral (otro)'].indexOf(inf)>=0)s+=3;
  if(inf==='Fúngica'||inf==='Múltiple')s+=5;
  if(p.estado&&p.estado.indexOf('Inestable')>=0)s+=3;
  if(p.estado&&p.estado.indexOf('Crítico')>=0)s+=7;
  var h=p.hemodi||'';if(h&&h!=='No')s+=(h==='Múltiples vasoactivos'?5:3);
  if(s<=4)return{niv:'Evolución favorable',cls:'b-ok',de:Math.max(3,7-Math.floor(dp/5))};
  if(s<=10)return{niv:'Complejidad moderada',cls:'b-med',de:Math.max(7,21-Math.floor(dp/3))};
  if(s<=18)return{niv:'Alta complejidad',cls:'b-mal',de:Math.max(14,45-Math.floor(dp/2))};
  return{niv:'Crítico',cls:'b-mal',de:null};
}

// STORAGE
function lsave(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){}}
function lload(){try{var d=localStorage.getItem(SK);return d?JSON.parse(d):[];}catch(e){return[];}}
function psave(d){try{localStorage.setItem(SK+'_p',JSON.stringify(d));}catch(e){}}
function pload(){try{var d=localStorage.getItem(SK+'_p');return d?JSON.parse(d):[];}catch(e){return[];}}
pending=pload();

function obUpdate(){
  var b=document.getElementById('ob');if(!b)return;
  if(!online){b.textContent='Sin conexión — los cambios se sincronizan al volver la señal.';b.className='offline-bar show';}
  else if(pending.length){b.textContent=pending.length+' cambio(s) pendiente(s) de sincronizar.';b.className='offline-bar show';}
  else{b.className='offline-bar';}
}

function pull(){
  if(!online)return;
  fetch(SU+'?action=list',{cache:'no-store'})
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.pacientes){lsave(d.pacientes);PXS=d.pacientes;renderSala(d.pacientes);dot('ok');}
  }).catch(function(){dot('er');});
}

function push(body,cb){
  fetch(SU,{method:'POST',body:JSON.stringify(body)})
  .then(function(r){return r.json();})
  .then(function(){if(cb)cb();})
  .catch(function(){});
}

function flush(cb){
  if(!pending.length||!online){if(cb)cb();return;}
  var ops=pending.slice();pending=[];psave([]);
  var i=0;
  function next(){
    if(i>=ops.length){if(cb)cb();return;}
    push(ops[i],function(){i++;next();});
    i++;
  }
  next();
  obUpdate();
}

function savePx(p){
  dot('sy');
  var data=lload();
  if(EID)data=data.filter(function(x){return x.id!==EID;});
  data.push(p);lsave(data);PXS=data;EID=null;
  renderSala(data);showSala();
  if(online){
    push({action:'save',paciente:p},function(){dot('ok');pull();});
  }else{
    pending.push({action:'save',paciente:p});psave(pending);obUpdate();dot('of');
  }
}

function delPx(id){
  if(!confirm('¿Eliminar este paciente?'))return;
  var data=lload().filter(function(p){return p.id!==id;});
  lsave(data);PXS=data;renderSala(data);showSala();
  if(online)push({action:'delete',id:id},function(){pull();});
  else{pending.push({action:'delete',id:id});psave(pending);obUpdate();}
}

function darAlta(id){
  var p=PXS.find(function(x){return x.id===id;});if(!p)return;
  if(!confirm('¿Dar de alta a '+p.nombre+'?\nEl paciente se archivará y no aparecerá más en el pase activo.'))return;
  var pAlta=Object.assign({},p,{alta:true,fecha_alta:hoy()});
  try{var altas=JSON.parse(localStorage.getItem(SK+'_altas')||'[]');altas.push(pAlta);localStorage.setItem(SK+'_altas',JSON.stringify(altas));}catch(e){}
  var data=lload().filter(function(x){return x.id!==id;});
  lsave(data);PXS=data;renderSala(data);showSala();
  if(online){push({action:'save_alta',paciente:pAlta},function(){});push({action:'delete',id:id},function(){pull();});}
  else{pending.push({action:'delete',id:id});psave(pending);obUpdate();}
}

function forceSync(){
  setTab('t-sync');dot('sy');
  flush(function(){pull();setTimeout(function(){setTab('t-sala');},600);});
}

function dot(s){
  var el=document.getElementById('sdot'),sl=document.getElementById('slbl');
  var colors={ok:'#27a',sy:'#BA7517',er:'#E24B4A',of:'#aaa'};
  if(el)el.style.background=colors[s]||'#aaa';
  if(sl)sl.textContent=s==='ok'?'OK '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}):s==='sy'?'Sincronizando...':s==='er'?'Error servidor':'Sin conexión';
}

// START
var localData=lload();
if(localData.length){PXS=localData;renderSala(localData);}else{renderSala([]);}
if(online){flush(function(){pull();});}else{dot('of');obUpdate();}
setInterval(function(){if(online)pull();},15000);
setInterval(function(){if(PXS.length)renderSala(PXS);},60000);
</script>
